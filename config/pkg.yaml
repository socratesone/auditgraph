pkg_root: "."
active_profile: "default"
run_metadata:
  pipeline_version: "v0.1.0"
security:
  redaction:
    enabled: true
    policy_id: "redaction.policy.v1"
    policy_version: "v1"
    detectors:
      - "pem_private_key"
      - "jwt"
      - "bearer_token"
      - "credential_kv"
      - "url_credentials"
      - "vendor_token"
storage:
  footprint_budget:
    multiplier: 3.0
    warn_threshold: 0.8
    block_threshold: 1.0
profiles:
  default:
    include_paths:
      - "notes"
      - "repos"
      - "auditgraph"
      - "docs"
    exclude_globs:
      - "**/node_modules/**"
      - "**/.git/**"
    normalization:
      unicode: "NFC"
      line_endings: "LF"
      path_style: "posix"
    ingestion:
      allowed_extensions:
        - ".md"
        - ".markdown"
        - ".txt"
        - ".log"
        - ".pdf"
        - ".docx"
      ocr_mode: "off"
      chunk_tokens: 200
      chunk_overlap_tokens: 40
      max_file_size_bytes: 209715200
      capture_channels:
        - "scan"
        - "manual"
      frontmatter_schema:
        - "title"
        - "tags"
        - "project"
        - "status"
    extraction:
      rule_packs:
        - "config/extractors/core.yaml"
      llm:
        enabled: false
      # NER is opt-in. It runs spaCy inference over every chunk in the workspace
      # and is meaningful only on natural-language content (notes, documents, PDFs).
      # On code-only repositories the inference cost is high and the results are
      # mostly false positives (variable/function names matching PERSON/ORG patterns).
      # To enable: install the model with `python -m spacy download en_core_web_sm`,
      # then set `enabled: true` below.
      #
      # Even when enabled, NER only runs on chunks whose source file extension is
      # in `natural_language_extensions`. Add or remove extensions as needed.
      # Files with no extension (e.g. Makefile) and unknown extensions are skipped.
      ner:
        enabled: false
        model: "en_core_web_sm"
        quality_threshold: 0.3
        natural_language_extensions:
          - ".md"
          - ".markdown"
          - ".txt"
          - ".rst"
          - ".pdf"
          - ".docx"
        entity_types:
          - "PERSON"
          - "ORG"
          - "GPE"
          - "DATE"
          - "LAW"
          - "MONEY"
        cooccurrence_types:
          - "PERSON"
          - "ORG"
          - "GPE"
        # Post-extraction quality filter (Issue 3 Phase 3). Drops the most
        # common spaCy en_core_web_sm false positives on technical content:
        # short acronym ner:org, single-word ner:person, ner:money without a
        # currency marker. Each rule is configurable; see
        # auditgraph/extract/ner.py:filter_low_quality_entities for details.
        # Set filter_low_quality: false to disable the entire filter.
        filter_low_quality: true
        min_person_words: 2
        max_short_acronym_org_length: 4
        require_money_currency_marker: true
    knowledge_model:
      primary_namespace: "ag"
      allow_secondary_namespaces: true
      confidence_policy: "rule_only"
      contradiction_policy: "record_both"
    linking:
      rule_packs:
        - "config/link_rules/core.yaml"
    search:
      keyword:
        enabled: true
      semantic:
        enabled: false
      ranking:
        w_kw: 1.0
        w_sem: 0.3
        w_graph: 0.1
        score_rounding: 0.000001
